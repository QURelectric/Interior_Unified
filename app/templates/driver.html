<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kart Driver Display</title>
    <style>
        :root {
            --neon-blue: #0A4FFF;
            --neon-red: #ff0a0a;
            --glow-text: 0 0 5px #fff, 0 0 10px var(--neon-blue);
        }

        body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: black;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: grid;
            /* 3x3 Grid to handle corners and center */
            grid-template-columns: 1fr 1.5fr 1fr;
            grid-template-rows: 1fr 1.5fr 1fr;
            box-sizing: border-box;
            padding: 10px;
        }

        /* Generic styling for data readouts */
        .data-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 5vw; /* Scales with screen width */
            font-weight: bold;
            text-shadow: var(--glow-text);
        }

        .label { font-size: 2.5vw; opacity: 0.8; text-transform: uppercase; }

        /* Positioning */
        .lap { grid-column: 1; grid-row: 1; align-items: flex-start; }
        .motor-temp { grid-column: 3; grid-row: 1; align-items: flex-end; text-align: right; }
        .lap-time { grid-column: 1; grid-row: 3; align-items: flex-start; }
        .battery { grid-column: 3; grid-row: 3; align-items: flex-end; text-align: right; }

        /* Speedometer Center */
        .speedometer {
            grid-column: 2;
            grid-row: 2;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            aspect-ratio: 1/1;
        }

        .speed-ring {
            width: 90%;
            height: 90%;
            border-radius: 50%;
            transform: rotate(-135deg);
            transition: background 0.1s ease;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        .speed-hole {
            position: absolute;
            width: 75%;
            height: 75%;
            border-radius: 50%;
            background: black;
            z-index: 1;
        }

        .speed-text-container {
            position: absolute;
            z-index: 2;
            text-align: center;
        }

        .speed-text {
            font-size: 18vw;
            font-weight: 900;
            line-height: 1;
            display: block;
        }

        .unit {
            font-size: 4vw;
            letter-spacing: 2px;
        }

        /* Overlays */
        .pit {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid var(--neon-blue);
            padding: 15px;
            border-radius: 15px;
            font-size: 8vw;
            text-align: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
        }

        .exit {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            text-align: center;
            font-size: 10vw;
            color: white;
            text-shadow: 0 0 20px var(--neon-red);
            padding: 20px;
        }

        /* Animations */
        .show { animation: fadeIn 0.4s forwards; }
        .zoom { animation: zoomIn 0.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes zoomIn { from { opacity: 0; scale: 0.5; } to { opacity: 1; scale: 1; } }

        /* Landscape Optimization */
        @media (orientation: landscape) {
            .data-box { font-size: 4vh; }
            .label { font-size: 2vh; }
            .speed-text { font-size: 15vh; }
        }
    </style>
</head>
<body>

    <div class="data-box lap">
        <span class="label">Lap</span>
        <span id="lap">01</span>
    </div>

    <div class="data-box motor-temp">
        <span class="label">Motor</span>
        <span><span id="motor">--</span>°C</span>
    </div>

    <div class="speedometer">
        <div class="speed-ring" id="speed-ring"></div>
        <div class="speed-hole"></div>
        <div class="speed-text-container">
            <span class="speed-text" id="speed-text">0</span>
            <span class="unit">KM/H</span>
        </div>
    </div>

    <div class="data-box lap-time">
        <span class="label">Time</span>
        <span id="time">0:00.0</span>
    </div>

    <div class="data-box battery">
        <span class="label">Battery</span>
        <span id="soc">--%</span>
    </div>

    <div id="pit" class="pit"></div>
    <div id="exit" class="exit"></div>

    <script>
        // WebSocket Logic
        const ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById("lap").innerText = data.lap;
            document.getElementById("motor").innerText = data.temp.toFixed(1);
            document.getElementById("time").innerText = data.time;
            document.getElementById("soc").innerText = data.batterySOC + "%";
        };

        // Speed Animation (Internal Demo)
        function updateSpeed(speed) {
            const maxSpeed = 100;
            const angle = (speed / maxSpeed) * 270;
            document.getElementById("speed-ring").style.background = `
                conic-gradient(
                    #cfe4ff 0deg,
                    #0072ff ${angle}deg,
                    transparent ${angle}deg
                )
            `;
            document.getElementById("speed-text").textContent = Math.round(speed);
        }

        let s = 0;
        setInterval(() => {
            s = (s + 1) % 101;
            updateSpeed(s);
        }, 50);

        // Alerts
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") showPit("PIT SOON");
            if (e.code === "Backspace") showExit("EXIT VEHICLE NOW");
        });

        function showPit(msg) {
            const p = document.getElementById("pit");
            p.textContent = msg;
            p.classList.add("show");
            setTimeout(() => p.classList.remove("show"), 5000);
        }

        function showExit(msg) {
            const e = document.getElementById("exit");
            e.textContent = msg;
            e.classList.add("zoom");
        }
    </script>
</body>
</html>
