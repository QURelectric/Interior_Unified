<!DOCTYPE html>
<html land="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kart Driver Display</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            background: black;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 4vw;
            color: white; 
            text-shadow:
                0 0 0.1vw #ffffff,
                0 0 0.4vw #ffffff,
                0 0 0.7vw #0A4FFF,
                0 0 1.1vw #0A4FFF,
                0 0 1.8vw #0A4FFF,
                0 0 2.7vw #0A4FFF;
        }

        /* Speedometer */
        .speedometer {
            width: 35%;
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            filter: drop-shadow(0 0 0.4vw #0A4FFF)
        }

        .speed-ring {
            width: 95%;
            height: 95%;
            border-radius: 50%;
            transform: rotate(-135deg);
            transition: background 0.08s linear;

            filter:
                drop-shadow(0 0 0.2vw #ffffff)
                drop-shadow(0 0 0.4vw #ffffff)
                drop-shadow(0 0 0.8vw #0A4FFF)
                drop-shadow(0 0 1.1vw #0A4FFF);
        }

        .speed-hole {
            position: absolute;
            width: 75%;
            height: 75%;
            border-radius: 50%;
            z-index: 1;
            background: black;
        }

        .speed-text {
            position: absolute;
            transform: translate(0%, -12%);
            z-index: 2;
            font-weight: bold;
            font-size: 9vw;
        }

        .unit {
            position: absolute;
            transform: translate(0%, 170%);
            z-index: 2;
            font-size: 3vw;
        } 

        /* Positioning */
        .lap {position: absolute; top: 2%; left: 2%;}
        .motor-temp {position: absolute; top: 2%; right: 2%;}
        .lap-time {position: absolute; bottom: 2%; left: 2%;}
        .battery {position: absolute; bottom: 2%; right: 2%;}

        /* Overlay Alerts */
        .pit {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 70%;
            padding: 1vw;
            border-radius: 1vw;
            
            background: rgba(30, 30, 30, 0.85);
            font-size: 8vw;
            text-align: center;

            opacity: 0;
            pointer-events: none;
        }

        .exit {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            background: #000;
            font-size: 10vw;
            text-align: center;
            text-shadow:
                0 0 0.1vw #ffffff,
                0 0 0.4vw #ffffff,
                0 0 0.7vw #ff0a0a,
                0 0 1.1vw #ff0a0a,
                0 0 1.8vw #ff0a0a,
                0 0 2.7vw #ff0a0a;

            opacity: 0;
            pointer-events: none;
        }

        /* Transitions */
        .pit.show {animation: slideDown 0.4s ease forwards;}
        .pit.hide {animation: slideUp 0.4s ease forwards;}
        .exit.zoom {animation: zoomIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;}

        @keyframes slideUp {0% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -80%); opacity: 0; }}
        @keyframes slideDown {0% { transform: translate(-50%, -80%); opacity: 0; } 100% { transform: translate(-50%, 0); opacity: 1; }}
        @keyframes zoomIn {0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }}

    </style>
</head>

<body>
    <div class="lap"> 
        Lap: <br> <span id="lap">--</span>
    </div>

    <div class="motor-temp"> 
        Temp:  <br> <span id="motor">--</span>  
    </div> 

    <div class="speedometer">
        <div class="speed-ring" id="speed-ring"></div>
        <div class="speed-hole"></div>
        <div class="speed-text" id="speed-text"></div>
        <div class="unit">km/h</div>
    </div> 

    <div class="lap-time"> 
        Time: <br> <span id="time">--</span> 
    </div> 

    <div class="battery"> 
        Battery: <br> <span id="soc">--</span>
    </div> 

    <div id="pit" class="pit"></div>
    <div id="exit" class="exit"></div>

    <script> 
        // Websocket Logic
        const ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            document.getElementById("lap").innerText = data.LapNumber;
            document.getElementById("motor").innerText = data.MotorTemp.toFixed(1);
            document.getElementById("time").innerText = data.LapTime;
            document.getElementById("soc").innerText = data.batterySOC + "%";
            updateSpeed(data.Speed);

            // Activating Alerts
            if (data.Pit == 1){
                showPit("PIT SOON");
            }
            if (data.Exit == 1){
                showExit("EXIT VEHICLE NOW");
            }
        };  

        // Updating Speed
        function updateSpeed(speed) {
            const maxSpeed = 100;
            const sweep = 270;  

            const angle = (speed / maxSpeed) * sweep;

            document.getElementById("speed-ring").style.background = `
                conic-gradient(
                    #cfe4ff 0deg,
                    #99c9ff ${angle * 0.25}deg,
                    #66aaff ${angle * 0.5}deg,
                    #3388ff ${angle * 0.75}deg,
                    #0072ff ${angle}deg,

                    transparent ${angle}deg
                )
            `;

            document.getElementById("speed-text").textContent = Math.round(speed);
        }

        // Alerts
        function showPit(message) {
            const pit = document.getElementById("pit");
            pit.textContent = message;            
            pit.classList.add("show");
            setTimeout(() => {pit.classList.remove("show"); pit.classList.add("hide");}, 10000); 
            pit.classList.remove("hide");
        }

        function showExit(message) {
            const exit = document.getElementById("exit");
            exit.textContent = message;
            exit.classList.add("zoom");
        }

    </script>
</body>
</html>
