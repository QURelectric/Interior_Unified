<!DOCTYPE html>
<html land="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kart Driver Display</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 4vw;
            color: white; 
            text-shadow:
                0 0 0.1vw #ffffff,
                0 0 0.4vw #ffffff,
                0 0 0.7vw #0A4FFF,
                0 0 1.1vw #0A4FFF,
                0 0 1.8vw #0A4FFF,
                0 0 2.7vw #0A4FFF;
        }

        /* Speedometer */
        .speedometer {
            width: 35%;
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            filter: drop-shadow(0 0 0.4vw #0A4FFF)
        }

        .speed-ring {
            width: 95%;
            height: 95%;
            border-radius: 50%;
            transform: rotate(-135deg);
            transition: background 0.08s linear;
            filter:
                drop-shadow(0 0 0.2vw #ffffff)
                drop-shadow(0 0 0.4vw #ffffff)
                drop-shadow(0 0 0.8vw #0A4FFF)
                drop-shadow(0 0 1.1vw #0A4FFF);
        }

        .speed-hole {
            position: absolute;
            width: 75%;
            height: 75%;
            border-radius: 50%;
            z-index: 1;
            background: black;
        }

        .speed-text {
            position: absolute;
            transform: translate(0%, -12%);
            z-index: 2;
            font-weight: bold;
            font-size: 9vw;
        }

        .unit {
            position: absolute;
            transform: translate(0%, 170%);
            z-index: 2;
            font-size: 3vw;
        } 

        /* Positioning */
        .current { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); text-align: center; }
        .motor-temp { position: absolute; top: 2%; right: 2%; text-align: right; }
        .battery { position: absolute; bottom: 2%; right: 2%; text-align: right; }

        /* Overlay Alerts */
        .pit {
            position: fixed;
            top: 15%; /* Adjusted to not overlap current display */
            left: 50%;
            transform: translate(-50%, 0);
            width: 70%;
            padding: 1vw;
            border-radius: 1vw;
            background: rgba(30, 30, 30, 0.85);
            font-size: 8vw;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .exit {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-size: 10vw;
            text-align: center;
            text-shadow:
                0 0 0.1vw #ffffff,
                0 0 0.4vw #ffffff,
                0 0 0.7vw #ff0a0a,
                0 0 1.1vw #ff0a0a,
                0 0 1.8vw #ff0a0a,
                0 0 2.7vw #ff0a0a;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
</head>

<body>
    <div class="current"> 
        Current: <br> <span id="current">--</span> A
    </div>

    <div class="motor-temp"> 
        Temp:  <br> <span id="motor">--</span>  
    </div> 

    <div class="speedometer">
        <div class="speed-ring" id="speed-ring"></div>
        <div class="speed-hole"></div>
        <div class="speed-text" id="speed-text"></div>
        <div class="unit">km/h</div>
    </div> 

    <div class="battery"> 
        Battery: <br> <span id="soc">--</span>
    </div> 

    <div id="pit" class="pit"></div>
    <div id="exit" class="exit"></div>

    <script> 
        var pitActive = false;
        var pitDismissTimer = null;

        function showPit(message) {
            const el = document.getElementById("pit");
            el.textContent = message;
            if (pitDismissTimer !== null) {
                clearTimeout(pitDismissTimer);
                pitDismissTimer = null;
            }
            el.style.opacity = "1";
            pitDismissTimer = setTimeout(() => {
                pitDismissTimer = null;
                if (!pitActive) {
                    el.style.opacity = "0";
                }
            }, 10000);
        }

        function hidePit() {
            if (pitDismissTimer === null) {
                document.getElementById("pit").style.opacity = "0";
            }
        }

        function showExit(message) {
            const el = document.getElementById("exit");
            el.textContent = message;
            el.style.opacity = "1";
        }

        const ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Update Displays
            document.getElementById("current").innerText = data.Current.toFixed(1);
            document.getElementById("motor").innerText = data.MotorTemp.toFixed(1);
            document.getElementById("soc").innerText = data.batterySOC + "%";
            updateSpeed(data.Speed);

            if (data.Pit == 1 && !pitActive) {
                pitActive = true;
                showPit("PIT SOON");
            } else if (data.Pit == 0 && pitActive) {
                pitActive = false;
                hidePit();
            }

            if (data.Exit == 1) {
                showExit("EXIT VEHICLE NOW");
            }
        };

        function updateSpeed(speed) {
            const maxSpeed = 100;
            const sweep = 270;  
            const angle = (speed / maxSpeed) * sweep;

            document.getElementById("speed-ring").style.background = `
                conic-gradient(
                    #cfe4ff 0deg,
                    #99c9ff ${angle * 0.25}deg,
                    #66aaff ${angle * 0.5}deg,
                    #3388ff ${angle * 0.75}deg,
                    #0072ff ${angle}deg,
                    transparent ${angle}deg
                )
            `;
            document.getElementById("speed-text").textContent = Math.round(speed);
        }
    </script>
</body>
</html>
